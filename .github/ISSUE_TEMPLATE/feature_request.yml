name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议！请尽量先描述要解决的"问题"，再讨论"方案"。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 现状是怎样的？为什么需要这个功能？
      placeholder: 用户希望能识别繁体中文，但当前只支持简中和英文……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的用户体验
      description: 站在用户角度描述，不需要写代码
      placeholder: 在 OCR 语言选择里增加"繁体中文"选项，识别效果跟简中一样准
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案（可选）
      description: 你想过哪些其它办法？为什么不选？

  - type: textarea
    id: extra
    attributes:
      label: 其它信息（可选）
      description: 设计参考、相关链接、对其它部分的影响等
