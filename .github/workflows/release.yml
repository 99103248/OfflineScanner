name: Release APK

on:
  # 仅在打了 v* tag 时触发
  push:
    tags:
      - 'v*'
  # 允许手动触发（指定 tag）
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write  # 允许把 APK 上传到 Release

jobs:
  build:
    name: Build & Sign Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # 强制 release build 不从 Gradle Build Cache 取产物。
          # 原因：keystore 信息从环境变量读取，但 Gradle 不会把这些 env var
          # 算进 cache key，于是改 secret 后 cache 仍命中、产出旧 APK。
          # 禁用 cache 后每次都从源码 build，多花 2-3 分钟但可信度满分。
          cache-disabled: true

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Detect signing capability
        id: signing
        run: |
          if [[ -n "${{ secrets.OFFSCAN_KEYSTORE_BASE64 }}" ]]; then
            echo "can_sign=true" >> "$GITHUB_OUTPUT"
            echo "Release signing: ENABLED"
          else
            echo "can_sign=false" >> "$GITHUB_OUTPUT"
            echo "Release signing: DISABLED (no keystore secret found, will skip release build)"
          fi

      - name: Assemble release APK (signed)
        if: steps.signing.outputs.can_sign == 'true'
        env:
          OFFSCAN_KEYSTORE_BASE64: ${{ secrets.OFFSCAN_KEYSTORE_BASE64 }}
          OFFSCAN_KEYSTORE_PASSWORD: ${{ secrets.OFFSCAN_KEYSTORE_PASSWORD }}
          OFFSCAN_KEY_ALIAS: ${{ secrets.OFFSCAN_KEY_ALIAS }}
          OFFSCAN_KEY_PASSWORD: ${{ secrets.OFFSCAN_KEY_PASSWORD }}
        run: |
          # Sanity check: 确认 shell 看得到所有 env var（不打值，只打长度）。
          # GitHub 自动把 secret 值替换为 ***，长度不会泄漏 secret 内容。
          echo "=== Shell-level env check ==="
          echo "  OFFSCAN_KEYSTORE_BASE64 length: ${#OFFSCAN_KEYSTORE_BASE64}"
          echo "  OFFSCAN_KEYSTORE_PASSWORD length: ${#OFFSCAN_KEYSTORE_PASSWORD}"
          echo "  OFFSCAN_KEY_ALIAS length: ${#OFFSCAN_KEY_ALIAS}"
          echo "  OFFSCAN_KEY_PASSWORD length: ${#OFFSCAN_KEY_PASSWORD}"
          echo ""

          # --no-daemon: daemon 复用会让进程级缓存的 env var 不刷新（这次跑的 daemon 是
          #              其它 step 启动的，env var 是当时的，没有我们的 OFFSCAN_*）。
          #              不用 daemon 就保证每次 build 都是新进程拿当前 env。
          # --no-build-cache: signingConfig 从 env var 读取，Gradle 不会把这些 env var
          #                   算进 cache key — 改 secret 后旧 APK 会被 cache 复用。
          # --rerun-tasks: 跳过 UP-TO-DATE 检查，强制每个 task 都重新执行。
          # --info: 更详细日志，方便排查 signingConfig 是否真的生效。
          ./gradlew assembleRelease \
            --no-daemon \
            --no-build-cache \
            --rerun-tasks \
            --info \
            --stacktrace \
            2>&1 | tee assemble-release.log

      - name: Upload build log (always, for debugging)
        if: steps.signing.outputs.can_sign == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: assemble-release-log-${{ github.run_id }}
          path: assemble-release.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Verify release APK is signed
        if: steps.signing.outputs.can_sign == 'true'
        run: |
          apk=$(ls app/build/outputs/apk/release/app-release*.apk 2>/dev/null | head -n 1)
          if [[ -z "$apk" ]]; then
            echo "::error::No release APK was produced"
            exit 1
          fi
          echo "Found release APK: $apk"
          if [[ "$apk" == *unsigned* ]]; then
            echo "::error::APK was produced but NOT signed (path contains 'unsigned')."
            echo "Check signingConfigs in app/build.gradle.kts and that all 4 secrets are correct."
            echo ""
            echo "=== Configuration phase output for diagnosis ==="
            grep -i "OffScan signing" assemble-release.log || echo "(no [OffScan signing] lines found in build log)"
            exit 1
          fi
          # apksigner 验签（jarsigner 也行，但 apksigner 是 Android 官方推荐）
          "$ANDROID_HOME/build-tools"/*/apksigner verify --verbose "$apk" || {
            echo "::error::apksigner refused this APK"
            exit 1
          }
          echo "OK release APK is properly signed"

      - name: Assemble debug APK (fallback / always)
        run: ./gradlew assembleDebug --stacktrace

      - name: Compute release tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APKs for release
        run: |
          mkdir -p release-assets
          tag="${{ steps.tag.outputs.tag }}"

          # 列出 release/ 目录里实际产物，方便排查
          echo "--- contents of app/build/outputs/apk/release ---"
          ls -la app/build/outputs/apk/release/ || true
          echo "--- contents of app/build/outputs/apk/debug ---"
          ls -la app/build/outputs/apk/debug/ || true
          echo ""

          # 复制 release APK：AGP 在不同情况下可能命名为 app-release.apk
          # （已签名）或 app-release-unsigned.apk（未签名）。两种都接受。
          release_apk=$(ls app/build/outputs/apk/release/app-release*.apk 2>/dev/null | head -n 1 || true)
          if [[ -n "$release_apk" ]]; then
            cp "$release_apk" "release-assets/offscan-${tag}-release.apk"
            echo "Copied release APK: $release_apk"
          else
            echo "WARN: no release APK produced"
          fi

          if [[ -f app/build/outputs/apk/debug/app-debug.apk ]]; then
            cp app/build/outputs/apk/debug/app-debug.apk "release-assets/offscan-${tag}-debug.apk"
            echo "Copied debug APK"
          fi

          echo ""
          echo "--- final release-assets contents ---"
          ls -la release-assets/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: release-assets/*.apk
          # 不覆盖已有的 release notes（如果用户已经手写过）
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Upload APK as workflow artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.tag.outputs.tag }}
          path: release-assets/*.apk
          retention-days: 30
