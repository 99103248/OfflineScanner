name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 允许手动触发
  workflow_dispatch:

# 同一分支并行触发只跑最新的，节省 Actions 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # 缓存 Gradle 用户主目录（依赖 + wrapper）+ 项目级 .gradle，按 lock 文件命中
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Compile (Kotlin)
        run: ./gradlew compileDebugKotlin --stacktrace

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Run Android Lint (debug)
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report-${{ github.sha }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
