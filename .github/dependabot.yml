version: 2
updates:
  # Gradle 依赖（含 AndroidX / Compose / OpenCV / RapidOCR / ML Kit / Hilt 等）
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "build"
      include: "scope"
    # 忽略真正需要人工大改的升级（其它都让 dependabot 自由提）。
    ignore:
      # Kotlin major 升级 (2.x -> 3.x) 必然牵动 KSP / Compose Compiler / Hilt /
      # AndroidX 全家桶。手动协调升级即可，不需要 dependabot 来骚扰。
      - dependency-name: "org.jetbrains.kotlin*"
        update-types: ["version-update:semver-major"]

      # KSP 版本号紧耦合 Kotlin 版本。dependabot 提的 KSP 升级
      # 大概率与当前 Kotlin 不匹配，我们手动配。
      - dependency-name: "com.google.devtools.ksp"

      # AGP 9.x 是真正的大破坏（强制 compileSdk 36+ / JDK 21 / 移除老 DSL），
      # 看 Google 官方公告再决定何时升。
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major"]

      # Gradle wrapper 跨大版本（9.x）跟 AGP major 联动，手动升即可。
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]

      # Hilt 2.57.x 有已知 JavaPoet/KotlinPoet 冲突 (dagger#4976)。等 2.58+ 修了再放。
      - dependency-name: "com.google.dagger:*"
        versions: ["2.57.0", "2.57.1", "2.57.2"]

      # Compose BOM major（2026.x+）目前没看，先观望
      - dependency-name: "androidx.compose:compose-bom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow 自身
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
