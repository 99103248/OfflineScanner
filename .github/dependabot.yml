version: 2
updates:
  # Gradle 依赖（含 AndroidX / Compose / OpenCV / RapidOCR / ML Kit / Hilt 等）
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "build"
      include: "scope"
    # 忽略某些会引入级联升级、需要人工策划的依赖
    ignore:
      # Compose BOM 大版本跳跃常常带 Kotlin 升级要求
      - dependency-name: "androidx.compose:compose-bom"
        update-types: ["version-update:semver-major"]

      # KSP 必须严格匹配 Kotlin 版本，要协调升级
      - dependency-name: "com.google.devtools.ksp"

      # AGP 自身的小版本可以升，但 8.9+ 要求 compileSdk 35+。
      # 等我们升 SDK 时再放开
      - dependency-name: "com.android.application"
        versions: [">=8.9.0"]

      # Hilt 2.59+ 要 Kotlin 2.1+，与项目的 Kotlin 2.0.21 不兼容
      - dependency-name: "com.google.dagger:*"
        versions: [">=2.59.0"]

      # 下面这组库要求 compileSdk 35/36 + AGP 8.9+。
      # 等本项目把 compileSdk / AGP 一起升级后可以删掉这块 ignore。
      - dependency-name: "androidx.lifecycle:*"
        versions: [">=2.9.0"]
      - dependency-name: "androidx.activity:activity-compose"
        versions: [">=1.10.0"]
      - dependency-name: "androidx.camera:*"
        versions: [">=1.5.0"]
      - dependency-name: "androidx.navigation:navigation-compose"
        versions: [">=2.9.0"]
      - dependency-name: "androidx.hilt:hilt-navigation-compose"
        versions: [">=1.3.0"]

  # GitHub Actions workflow 自身
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
